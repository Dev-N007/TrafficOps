version: '3.8'

services:
  backend:
    build: .
    container_name: trafficops-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/workspace/data
      - ./models:/workspace/models
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build:
      context: ./frontend
    container_name: trafficops-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
